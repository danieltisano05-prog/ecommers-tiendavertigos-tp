<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indumentaria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
    <header  class="header">
        <img  class="logo" src="assets/img-marca.svg" alt="Icono de la tienda" >
        <nav class="nadvar"> 
            <a   class="style-vinculo" href="crear-perfil.html">Nuevo perfil </a>
            <form  class="form" action="" method="post">
                <label for="usuario" >Inicio de sesion</label>
                <input type="text" id="usuario"  name="nomb" placeholder="Usuario" required >
                <input type="password" id="contaseña" name="pass" placeholder="************" required>
                <button  class="button" type="submit" >iniciar sesion</button>  
            </form>
        </nav>
    </header>
    
    <main>
        <img src="assets/indumentaria-header.png" alt="imagen entorno" >
        <h1>Indumentaria</h1>
        <ul>
            <li><h2>Remeras</h2></li>
            <div>
                <img src="assets/rem-uno.webp" alt="" height="450">
                <img src="assets/rem-dos.webp" alt="" height="450">
                <img src="assets/rem-tre.webp" alt="" height="450">    
            </div>
            <li><h2>Buzos</h2></li>
            <div>
                <img src="assets/buzo-uno.webp" alt="" height="450">
                <img src="assets/buzo-dos.webp" alt="" height="450">
                <img src="assets/buzo-tres.webp" alt="" height="450"> 
            </div>  
            <li><h2>Pantalones</h2></li>
            <div>
                <img src="assets/pant-uno.webp" alt="" height="450">
                <img src="assets/pant.webp" alt="" height="450">
                <img src="assets/pant-tres.webp" alt="" height="450">
            </div>
            <li><h2>Camperas</h2></li>
            <div>
                <img src="assets/campera-uno.webp" alt="" height="450">
                <img src="assets/campera-dos.webp" alt="" height="450">
                <img src="assets/campera-tres.webp" alt="" height="450"> 
            </div>
        </ul>
    </main>

    <footer>
        <a href="">Terminos y Condiciones </a>       
    </footer>
    </div>
</body>
</html>
