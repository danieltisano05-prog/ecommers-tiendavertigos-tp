<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo perfil</title>
</head>
<body>
    <header>
        <img src="assets/img-marca.svg" alt="Icono de la tienda" height="300">
        <nav>
            <a href="index.html">Home</a>
        </nav>
        <img src="assets/captine.webp" alt="imagen de paisaje urbano" height="200" width="1600">
    </header>
    <main>
        <form action="" method="post">
        <fieldset>
            <legend><h2>Crear nuevo perfil</h2></legend>
                <div>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre"  name="nomb" required>     
                </div>
                <div>
                    <br>
                    <label for="apellido">Apellido</label> 
                    <input type="text" id="apellido" name="apell" required>
                </div>
                <div>
                    <br>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="em" required>
                </div>
                <div>
                    <br>
                    <label for="Ciudad">Cuidad</label>
                    <select id="Ciudad" name="Prov" required>
                        <option value="" disabled selected>Seleccione una opcion</option>
                        <option value="Cordoba">Córdoba</option>
                        <option value="Buenos Aires">Buenos Aires</option>
                        <option value="Santa Fe">Santa Fe</option>
                        <option value="Rio Negro">Rio Negro</option>
                        <option value="Chubut">Chubut</option>
                        <option value="Tierra del fuego">Tierra del fuego</option>
                        <option value="Mendoza">Mendoza</option>
                        <option value="Neuquen">Neuquen</option>
                        <option value="Chaco">Chaco</option>
                    <option value="Formosa">Formosa</option>
                    </select>  
                </div>
                <div>
                    <br>
                    <label for="Fecha_Nacimiento">Fecha de nacimiento</label>
                    <input type="date" id="Fecha_Nacimiento" name="datenac" required>
                </div>
                <div>
                    <br>
                    <label for="contraseña">Contraseña</label>
                    <input type="password" name="pas" id="contraseña" placeholder="***************" required>
                </div>
        </fieldset>
        <div>
            <br>
            <button type="submit">Crear nuevo perfil</button>
        </div>
        </form>
    </main>
    <footer>
        <a href="">Terminos y condiciones</a>
    </footer>
</body>
</html>
